    function renderUI(data) {

    function makePick(matchId, team) {

    function checkMatchResult(matchId) {
        const match = schedule.find(x => x.id === matchId);
        const winner = match.home; // Simple logic: Home team wins for simulation

        db.ref('ipl_data').once('value', snapshot => {
            let data = snapshot.val() || { p1Score: 0, p2Score: 0, resolved: [], picks: {} };
            if (data.resolved && data.resolved.includes(matchId)) return;
            
            let picks = data.picks[matchId];
            if(!picks) return alert("Wait for picks!");

            let p1Add = (picks.p1 === winner) ? 1 : 0;
            let p2Add = (picks.p2 === winner) ? 1 : 0;
            let newResolved = data.resolved || [];
            newResolved.push(matchId);

            db.ref('ipl_data').update({
                p1Score: (data.p1Score || 0) + p1Add,
                p2Score: (data.p2Score || 0) + p2Add,
                resolved: newResolved
            });
