        :root {
            --bg: #060b1a; --card: #111827; --gold: #f59e0b;
            --p1-color: #00f2ff; --p2-color: #ff007b;
        }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: white; margin: 0; padding-bottom: 50px; }
        
        /* Header & Leaderboard */
        .header { 
            position: sticky; top: 0; z-index: 100; background: rgba(17, 24, 39, 0.95);
            padding: 15px; border-bottom: 2px solid var(--gold); display: flex;
            justify-content: space-around; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
        }
        .score-box { text-align: center; }
        .score-val { font-family: 'Oxanium'; font-size: 2.8rem; font-weight: 700; line-height: 1; }
        #p1-display { color: var(--p1-color); text-shadow: 0 0 10px rgba(0,242,255,0.3); } 
        #p2-display { color: var(--p2-color); text-shadow: 0 0 10px rgba(255,0,123,0.3); }
        .label { font-size: 0.7rem; letter-spacing: 2px; color: var(--gold); font-weight: 700; }

        /* Stats & Form Guide */
        .stats-area { max-width: 1200px; margin: 10px auto; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 20px; }
        .player-stats { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; text-align: center; border: 1px solid #1f2937; }
        .stat-row { display: flex; justify-content: space-between; align-items: center; margin-top: 5px; }
        .stat-val { font-family: 'Oxanium'; font-weight: 700; font-size: 1.1rem; }
        .form-guide { display: flex; gap: 4px; justify-content: center; margin-top: 5px; }
        .form-circle { width: 10px; height: 10px; border-radius: 50%; background: #374151; }
        .form-W { background: #10b981; box-shadow: 0 0 5px #10b981; }
        .form-L { background: #ef4444; }
        .hot-fire { font-size: 0.7rem; color: #ff4e50; font-weight: bold; animation: flicker 1s infinite; }

        /* Grid & Cards */
        .container { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); 
            gap: 20px; padding: 20px; max-width: 1200px; margin: 0 auto;
        }
        .match-card { 
            background: var(--card); border-radius: 12px; padding: 20px;
            border: 1px solid #1f2937; position: relative; transition: 0.3s;
            overflow: hidden;
        }
        .match-card.finished { border-color: #10b981 !important; background: #06110e; opacity: 0.85; }
        .date { font-size: 0.8rem; color: #9ca3af; margin-bottom: 10px; font-family: 'Oxanium'; }
        
        .vs-container { display: flex; align-items: center; justify-content: space-between; margin: 15px 0; }
        .team-btn { 
            flex: 1; padding: 12px 5px; border: 2px solid #374151; border-radius: 8px;
            background: #1f2937; color: white; cursor: pointer; font-weight: 700;
            transition: 0.3s; font-family: 'Oxanium'; font-size: 0.75rem;
        }
        
        /* Consistent Pick Coloring */
        .p1-picked { border-color: var(--p1-color) !important; background: #002a2e !important; box-shadow: 0 0 10px var(--p1-color); }
        .p2-picked { border-color: var(--p2-color) !important; background: #2e001a !important; box-shadow: 0 0 10px var(--p2-color); }
        
        .result-btn { 
            width: 100%; padding: 10px; margin-top: 15px; border: none;
            border-radius: 6px; font-family: 'Oxanium'; font-weight: 700;
            background: var(--gold); color: #000; cursor: pointer;
        }
        .result-btn:disabled { background: #374151; color: #9ca3af; cursor: not-allowed; }
        .winner-banner { text-align: center; margin-top: 10px; color: var(--gold); font-weight: 700; padding-top: 8px; border-top: 1px dashed #374151; }

        @keyframes flicker { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
    </style>
</head>

    db.ref('ipl_battle_2026').on('value', (snap) => {
        const data = snap.val() || {};
        if (!data.picks) data.picks = {};
        if (!data.results) data.results = {};
        render(data);
    });

    function render(data) {
        const results = data.results || {};
        const picks = data.picks || {};
        const totalDone = Object.keys(results).length;

        // --- CALC STATS LOGIC ---
        const calcStats = (pId) => {
            let wins = 0, streak = 0, form = [], activeStreak = true;
            const sortedIds = Object.keys(results).sort((a,b) => b-a);
            
            sortedIds.forEach((id, idx) => {
                const win = picks[id] && picks[id][pId] === results[id];
                if(win) { wins++; if(activeStreak) streak++; } else { activeStreak = false; }
                if(idx < 5) form.push(win ? 'W' : 'L');
            });
            return { winPct: totalDone > 0 ? Math.round((wins/totalDone)*100) : 0, streak, form: form.reverse() };
        };

        const p1 = calcStats('p1');
        const p2 = calcStats('p2');

        // --- UPDATE UI ---
        document.getElementById('p1-display').innerText = data.p1Score || 0;
        document.getElementById('p2-display').innerText = data.p2Score || 0;

        document.getElementById('stats-container').innerHTML = `

                <div class="stat-row"><span class="label">WIN %</span><span class="stat-val" style="color:var(--p1-color)">${p1.winPct}%</span></div>

            <div class="player-stats">
                <div class="stat-row"><span class="label">WIN %</span><span class="stat-val" style="color:var(--p2-color)">${p2.winPct}%</span></div>
                <div class="form-guide">${p2.form.map(f => `<div class="form-circle form-${f}"></div>`).join('')}</div>
                ${p2.streak > 1 ? `<div class="hot-fire">🔥 ${p2.streak} MATCH STREAK</div>` : ''}
            </div>
        `;

        const grid = document.getElementById('grid');
        const fragment = document.createDocumentFragment();

        matches.forEach(m => {
            const pick = picks[m.id] || {};
            const winner = results[m.id];
            const isDone = !!winner;
            const homeColor = teamColors[m.h] || '#1f2937';

            const card = document.createElement('div');
            card.className = `match-card ${isDone ? 'finished' : ''}`;
            card.style.borderLeft = `6px solid ${homeColor}`;
            
            card.innerHTML = `
                <div class="date">MATCH ${m.id} • ${m.date}</div>
                <div class="vs-container">
                    <button type="button" class="team-btn ${pick.p1 === m.h ? 'p1-picked' : ''} ${pick.p2 === m.h ? 'p2-picked' : ''}" 
                            onclick="makePick(${m.id}, '${m.h}', '${m.a}')">${m.h}</button>
                    <span style="margin:0 10px; font-weight:bold; color:#4b5563">VS</span>
                    <button type="button" class="team-btn ${pick.p1 === m.a ? 'p1-picked' : ''} ${pick.p2 === m.a ? 'p2-picked' : ''}" 
                            onclick="makePick(${m.id}, '${m.a}', '${m.h}')">${m.a}</button>
                </div>
                <button type="button" class="result-btn" ${isDone ? 'disabled' : ''} onclick="resolveMatch(${m.id}, '${m.h}', '${m.a}')">
                    ${isDone ? 'COMPLETED' : 'DECLARE WINNER'}
                </button>
                ${isDone ? `<div class="winner-banner">🏆 WINNER: ${winner}</div>` : ''}
            `;
            fragment.appendChild(card);
        });

        grid.innerHTML = '';
        grid.appendChild(fragment);
    }

    function makePick(matchId, selected, other) {
        const updates = {};
        updates[`picks/${matchId}/${myId}`] = selected;
        updates[`picks/${matchId}/${otherId}`] = other;
        db.ref('ipl_battle_2026').update(updates);
    }

    function resolveMatch(matchId, teamA, teamB) {
        const winner = prompt(`Who won Match ${matchId}? Enter "${teamA}" or "${teamB}":`);
        if (!winner) return;
        
        const norm = winner.trim();
        if (norm !== teamA && norm !== teamB) { alert("Invalid team name."); return; }

        db.ref('ipl_battle_2026').once('value', (snap) => {
            const data = snap.val() || { picks: {}, results: {}, p1Score: 0, p2Score: 0 };
            const matchPicks = data.picks ? data.picks[matchId] : null;
            
            if (!matchPicks) { alert("Select teams first!"); return; }

            const p1Plus = (matchPicks.p1 === norm) ? 1 : 0;
            const p2Plus = (matchPicks.p2 === norm) ? 1 : 0;

            const updates = {};
            updates[`results/${matchId}`] = norm;
            updates[`p1Score`] = (data.p1Score || 0) + p1Plus;
            updates[`p2Score`] = (data.p2Score || 0) + p2Plus;
            db.ref('ipl_battle_2026').update(updates);
        });
    }
