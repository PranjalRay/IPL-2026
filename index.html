    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        :root { --bg: #020617; --card: #1e293b; --text: #f8fafc; --accent: #ffd700; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; padding-top: 140px; }
        
        /* Fixed Header with Animated Counters */
        header { position: fixed; top: 0; left: 0; right: 0; background: #0f172a; padding: 15px; border-bottom: 2px solid var(--accent); display: flex; justify-content: space-around; align-items: center; z-index: 1000; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        .counter-box { text-align: center; }
        .counter-label { font-size: 0.7rem; color: var(--accent); font-weight: bold; letter-spacing: 1px; margin-bottom: 5px; }
        .wheel-digit { display: inline-block; background: #334155; color: white; padding: 5px 10px; border-radius: 4px; font-size: 1.8rem; font-weight: 900; border-bottom: 3px solid rgba(0,0,0,0.3); }

        /* Larger Score Frame */
        .score-container { position: relative; width: 100%; height: 200px; background: #1e293b; border-radius: 12px; overflow: hidden; margin-bottom: 20px; border: 1px solid #334155; }
        .score-container iframe { width: 100%; height: 500px; border: none; margin-top: -150px; } /* Offset to hide headers of external widgets */

        /* Schedule Layout */
        .match-card { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 12px; transition: transform 0.2s; border: 1px solid rgba(255,255,255,0.05); }
        .match-card:active { transform: scale(0.98); }
        .match-meta { display: flex; justify-content: space-between; font-size: 0.7rem; opacity: 0.6; margin-bottom: 8px; }
        .teams { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .team-name { font-size: 1rem; font-weight: 700; width: 40%; }
        .vs { font-size: 0.8rem; color: var(--accent); font-style: italic; }
        
        /* Selection Buttons */
        .btn-group { display: flex; gap: 8px; }
        .btn { flex: 1; padding: 12px; border: none; border-radius: 8px; cursor: pointer; background: #334155; color: white; font-weight: 600; font-size: 0.8rem; }
        .btn.selected { background: var(--accent); color: black; box-shadow: 0 0 15px rgba(255, 215, 0, 0.3); }
        .btn.winner { border: 2px solid #22c55e; position: relative; }
        .btn.winner::after { content: '🏆'; position: absolute; top: -10px; right: -5px; }

        .admin-btn { position: fixed; bottom: 20px; right: 20px; background: var(--accent); border: none; border-radius: 50%; width: 50px; height: 50px; font-size: 1.2rem; cursor: pointer; z-index: 100; box-shadow: 0 4px 10px black; }
    </style>
</head>

function init() {
    db.ref('ipl2026').on('value', snap => {
        const data = snap.val() || {matches: {}};
        renderSchedule(data);
        updateCounters(data);
    });
}

function renderSchedule(data) {
    const container = document.getElementById('schedule');
    container.innerHTML = matches.map(m => {
        const mRef = data.matches?.[m.id] || {};
        const myPick = mRef.picks?.[user];
        const winner = mRef.winner;

        return `
            <div class="match-card">
                <div class="match-meta">
                    <span>MATCH ${m.id} • ${m.d}</span>
                    <span>${m.v}</span>
                </div>
                <div class="teams">
                    <div class="team-name">${m.h}</div>
                    <div class="vs">VS</div>
                    <div class="team-name" style="text-align:right">${m.a}</div>
                </div>
                <div class="btn-group">
                    <button class="btn ${myPick === m.h ? 'selected' : ''} ${winner === m.h ? 'winner' : ''}" 
                            onclick="makePick(${m.id}, '${m.h}')">${m.h.split(' ').pop()}</button>
                    <button class="btn ${myPick === m.a ? 'selected' : ''} ${winner === m.a ? 'winner' : ''}" 
                            onclick="makePick(${m.id}, '${m.a}')">${m.a.split(' ').pop()}</button>
                </div>
            </div>
        `;
    }).join('');
}

function updateCounters(data) {
    let fCount = 0, sCount = 0;
    matches.forEach(m => {
        const mRef = data.matches?.[m.id];
        if (mRef?.winner) {
            if (mRef.picks?.Father === mRef.winner) fCount++;
            if (mRef.picks?.Son === mRef.winner) sCount++;
        }
    });

    animateCounter('f-wins', fCount);
    animateCounter('s-wins', sCount);
}

function animateCounter(id, newCount) {
    const el = document.getElementById(id);
    if (el.innerText != newCount) {
        el.classList.add('animate__flipInX');
        el.innerText = newCount;
        setTimeout(() => el.classList.remove('animate__flipInX'), 1000);
    }
}

function makePick(id, team) {
    db.ref(`ipl2026/matches/${id}/picks/${user}`).set(team);
}

function setWinnerPrompt() {
    const pin = prompt("Admin Pin:");
    if (pin === "1234") {
        const id = prompt("Match Number (1-70):");
        const winner = prompt("Winning Team Full Name:");
        if (id && winner) db.ref(`ipl2026/matches/${id}/winner`).set(winner);
    }
}
