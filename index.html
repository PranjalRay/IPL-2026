<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPL 2026 Tracker</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@400;700&family=Outfit:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #060b1a; 
            --card: rgba(17, 24, 39, 0.7);
            --gold: #f59e0b;
            --p1-color: #00f2ff; 
            --p2-color: #ff007b;
        }
        
        body { 
            font-family: 'Outfit', sans-serif; 
            background-color: var(--bg);
            background-image: 
                linear-gradient(rgba(18, 113, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(18, 113, 255, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            color: white; 
            margin: 0; 
            padding-bottom: 80px; 
        }
        
        /* Updated Header with central Status Dot */
        .header { 
            position: sticky; top: 0; z-index: 1000; 
            background: rgba(17, 24, 39, 0.85);
            backdrop-filter: blur(15px);
            padding: 10px 15px; border-bottom: 2px solid var(--gold); 
            display: flex; justify-content: space-around; align-items: center; 
        }

        #status-dot { width: 7px; height: 7px; border-radius: 50%; background: #10b981; display: block; margin: 0 auto 4px; box-shadow: 0 0 8px #10b981; }
        .offline #status-dot { background: #ef4444; box-shadow: 0 0 8px #ef4444; }

        .score-val { font-family: 'Oxanium'; font-size: 2.2rem; font-weight: 700; line-height: 1; }
        #p1-display { color: var(--p1-color); text-shadow: 0 0 10px var(--p1-color); } 
        #p2-display { color: var(--p2-color); text-shadow: 0 0 10px var(--p2-color); }
        .label { font-size: 0.65rem; letter-spacing: 1.5px; color: var(--gold); font-weight: 700; text-transform: uppercase; cursor: pointer; margin-bottom: 5px; }

        /* Smaller Search Bar */
        .search-container { max-width: 1200px; margin: 15px auto; padding: 0 20px; text-align: center; }
        #team-search { 
            width: 80%; max-width: 240px; padding: 8px 15px; border-radius: 20px; border: 1px solid #374151;
            background: var(--card); color: white; font-family: 'Outfit'; outline: none; font-size: 0.85rem;
        }
        #team-search:focus { border-color: var(--p1-color); box-shadow: 0 0 10px var(--p1-color); }

        /* Emoji Picker Modal */
        #emoji-modal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(17, 24, 39, 0.95); backdrop-filter: blur(20px);
            padding: 20px; border-radius: 15px; border: 2px solid var(--gold);
            z-index: 2000; text-align: center; box-shadow: 0 0 30px rgba(0,0,0,0.8);
        }
        .emoji-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 15px; }
        .emoji-opt { font-size: 1.5rem; cursor: pointer; padding: 5px; transition: 0.2s; border-radius: 5px; }
        .emoji-opt:hover { background: rgba(255,255,255,0.1); transform: scale(1.2); }

        /* Shared Components */
        .collapsible-stats { max-width: 1200px; margin: 15px auto; padding: 0 20px; }
        .collapsible-stats summary { 
            cursor: pointer; background: rgba(31, 41, 55, 0.7); padding: 12px; border-radius: 8px; 
            border: 1px solid #374151; list-style: none; text-align: center; font-family: 'Oxanium'; font-weight: bold;
        }
        .stats-grid-box { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 15px; margin-top: 10px; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 8px;
        }
        
        .form-row { display: flex; gap: 5px; justify-content: center; margin-top: 10px; }
        .form-circle { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; color: white; border: 1px solid rgba(255,255,255,0.1); }
        .form-W { background: #10b981; box-shadow: 0 0 5px #10b981; } 
        .form-L { background: #ef4444; } 
        .form-NR { background: #6b7280; }
        .form-empty { border: 1px dashed #4b5563; color: #4b5563; }

        table { width: 100%; border-collapse: collapse; font-family: 'Oxanium'; font-size: 0.85rem; }
        th { border-bottom: 2px solid #374151; padding: 12px; color: var(--gold); text-align: left; background: rgba(31, 41, 55, 0.5); }
        td { padding: 12px; border-bottom: 1px solid rgba(55, 65, 81, 0.3); }

        .container { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; padding: 20px; max-width: 1200px; margin: 0 auto; }
        .match-card { 
            background: var(--card); border-radius: 12px; padding: 20px; 
            border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(8px);
            transition: 0.4s; position: relative;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3), 0 0 10px var(--team-glow, transparent);
        }
        .match-card.finished-win { border-color: #10b981; background: rgba(16, 185, 129, 0.15); }
        .match-card.finished-loss { border-color: #ef4444; background: rgba(239, 68, 68, 0.15); }
        .match-card.finished-rain { border-color: #6b7280; background: rgba(107, 114, 128, 0.15); }

        .team-row { display: flex; gap: 10px; margin: 15px 0; }
        .team-btn { flex: 1; padding: 12px 5px; border: 2px solid #374151; border-radius: 8px; background: #1f2937; color: white; cursor: pointer; font-family: 'Oxanium'; font-size: 0.8rem; }
        .p1-picked { border-color: var(--p1-color) !important; background: #002a2e !important; box-shadow: 0 0 12px var(--p1-color); }
        .p2-picked { border-color: var(--p2-color) !important; background: #2e001a !important; box-shadow: 0 0 12px var(--p2-color); }

        .result-btn { width: 100%; padding: 12px; background: var(--gold); border: none; border-radius: 6px; font-family: 'Oxanium'; font-weight: bold; cursor: pointer; color: #060b1a; }
        .result-btn:disabled { background: #1f2937; color: #4b5563; cursor: not-allowed; }
        
        #btn-top { 
            position: fixed; bottom: 20px; right: 20px; background: var(--gold); border: none; 
            width: 50px; height: 50px; border-radius: 50%; font-size: 25px; 
            cursor: pointer; display: none; z-index: 999; box-shadow: 0 0 15px var(--gold); 
        }
        .footer-tools { text-align: center; margin-top: 40px; opacity: 0.3; font-size: 0.7rem; }
    </style>
</head>
<body>

<div id="emoji-modal">
    <div class="label" id="picker-title">Select Avatar</div>
    <div class="emoji-grid">
        <span class="emoji-opt" onclick="setAvatar('👦')">👦</span>
        <span class="emoji-opt" onclick="setAvatar('👨')">👨</span>
        <span class="emoji-opt" onclick="setAvatar('🏏')">🏏</span>
        <span class="emoji-opt" onclick="setAvatar('🔥')">🔥</span>
        <span class="emoji-opt" onclick="setAvatar('🏆')">🏆</span>
        <span class="emoji-opt" onclick="setAvatar('🏟️')">🏟️</span>
        <span class="emoji-opt" onclick="setAvatar('⚡')">⚡</span>
        <span class="emoji-opt" onclick="setAvatar('😎')">😎</span>
        <span class="emoji-opt" onclick="setAvatar('👑')">👑</span>
        <span class="emoji-opt" onclick="setAvatar('🦁')">🦁</span>
    </div>
    <button onclick="closeEmojiPicker()" style="margin-top:15px; background:none; border:1px solid var(--gold); color:var(--gold); padding:5px 10px; border-radius:5px; cursor:pointer;">Close</button>
</div>

<div class="header">
    <div class="score-box" style="text-align:center">
        <div class="label" onclick="openEmojiPicker('p1')">SON <span id="p1-emoji"></span></div>
        <div id="p1-display" class="score-val">0</div>
    </div>
    
    <div style="text-align:center">
        <span id="status-dot"></span>
        <div style="font-family:'Oxanium'; font-weight:bold; color:var(--gold); font-size: 0.9rem;">VS</div>
    </div>

    <div class="score-box" style="text-align:center">
        <div class="label" onclick="openEmojiPicker('p2')">DAD <span id="p2-emoji"></span></div>
        <div id="p2-display" class="score-val">0</div>
    </div>
</div>

<div class="search-container">
    <input type="text" id="team-search" placeholder="Search team..." oninput="handleSearch()">
</div>

<details class="collapsible-stats">
    <summary>📊 BATTLE STATISTICS & FORM</summary>
    <div class="stats-grid-box">
        <div style="text-align: center; border: 1px solid #374151; padding: 15px; border-radius: 8px; background: var(--card);">
            <div class="label">MY BATTLE WIN %</div>
            <div id="win-pct" style="font-size: 2rem; font-family: 'Oxanium'; color: var(--p1-color); margin-top: 5px;">0%</div>
        </div>
        <div style="text-align: center; border: 1px solid #374151; padding: 15px; border-radius: 8px; background: var(--card);">
            <div class="label">MY LAST 5 (BATTLE)</div>
            <div id="user-history" class="form-row"></div>
        </div>
    </div>
</details>

<details class="collapsible-stats">
    <summary>🏆 SEASON POINTS TABLE</summary>
    <div style="margin-top: 10px; border: 1px solid #374151; border-radius: 8px; overflow: hidden; background: var(--card);">
        <table>
            <thead><tr><th>TEAM</th><th>P</th><th>W</th><th>L</th><th>PTS</th><th>NRR</th></tr></thead>
            <tbody id="points-body"></tbody>
        </table>
    </div>
</details>

<div id="grid" class="container"></div>

<button id="btn-top" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">↑</button>

<div class="footer-tools">
    <button onclick="resetData()" style="background:none; border:none; color:red; cursor:pointer;">Reset All Battle Data</button>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCLQleq0qO6RQHBA-gqvJDmgrMXQQRSUYg",
        authDomain: "ipl-2026-dd5d0.firebaseapp.com",
        databaseURL: "https://ipl-2026-dd5d0-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "ipl-2026-dd5d0",
        storageBucket: "ipl-2026-dd5d0.firebasestorage.app",
        messagingSenderId: "595437597357",
        appId: "1:595437597357:web:fba3115ee06d10d9b90c24"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const params = new URLSearchParams(window.location.search);
    const myId = params.get('user') || 'p1';
    let activePickerId = 'p1';

    const teamColors = {
        "Royal Challengers Bengaluru": "#ec1c24", "Mumbai Indians": "#004ba0", 
        "Chennai Super Kings": "#ffff00", "Kolkata Knight Riders": "#b886ee", 
        "Sunrisers Hyderabad": "#ff822a", "Rajasthan Royals": "#ea1a85",
        "Gujarat Titans": "#5da1e3", "Delhi Capitals": "#4a90e2", 
        "Lucknow Super Giants": "#a3ceee", "Punjab Kings": "#ed1b24"
    };

    // Full match list (abbreviated for the example, ensure your full list is here)
    const matches = [
        { id: 1, date: "28-MAR-26", h: "Royal Challengers Bengaluru", a: "Sunrisers Hyderabad" },
        { id: 2, date: "29-MAR-26", h: "Mumbai Indians", a: "Kolkata Knight Riders" },
        { id: 3, date: "30-MAR-26", h: "Rajasthan Royals", a: "Chennai Super Kings" },
        { id: 4, date: "31-MAR-26", h: "Punjab Kings", a: "Gujarat Titans" },
        { id: 5, date: "01-APR-26", h: "Lucknow Super Giants", a: "Delhi Capitals" }
        // ... (Add all 70 matches from previous version)
    ];

    let currentData = {};

    db.ref('ipl_battle_2026').on('value', snap => {
        currentData = snap.val() || {};
        render(currentData);
    });

    window.addEventListener('online', () => document.body.classList.remove('offline'));
    window.addEventListener('offline', () => document.body.classList.add('offline'));

    function handleSearch() { render(currentData); }

    function openEmojiPicker(id) { 
        activePickerId = id;
        document.getElementById('picker-title').innerText = `Select Avatar for ${id === 'p1' ? 'SON' : 'DAD'}`;
        document.getElementById('emoji-modal').style.display = 'block'; 
    }
    
    function closeEmojiPicker() { document.getElementById('emoji-modal').style.display = 'none'; }
    
    function setAvatar(emoji) {
        db.ref(`ipl_battle_2026/avatars/${activePickerId}`).set(emoji);
        closeEmojiPicker();
    }

    function render(data) {
        const avatars = data.avatars || {};
        const results = data.results || {};
        const picks = data.picks || {};
        const searchTerm = document.getElementById('team-search').value.toLowerCase();
        
        document.getElementById('p1-display').innerText = data.p1Score || 0;
        document.getElementById('p2-display').innerText = data.p2Score || 0;
        
        // Safety: fallback to default emojis if data is missing/undefined
        document.getElementById('p1-emoji').innerText = avatars.p1 || '👦';
        document.getElementById('p2-emoji').innerText = avatars.p2 || '👨';

        // Grid Rendering
        document.getElementById('grid').innerHTML = matches
        .filter(m => m.h.toLowerCase().includes(searchTerm) || m.a.toLowerCase().includes(searchTerm))
        .map(m => {
            const pick = picks[m.id] || {};
            const win = results[m.id];
            let state = win ? (pick[myId] === win ? 'finished-win' : 'finished-loss') : '';
            return `
                <div class="match-card ${state}" style="--team-glow: ${teamColors[m.h]}44">
                    <div class="label" style="font-size:0.6rem; color:#9ca3af">Match ${m.id} • ${m.date}</div>
                    <div class="team-row">
                        <button class="team-btn ${pick.p1===m.h?'p1-picked':''} ${pick.p2===m.h?'p2-picked':''}" onclick="makePick(${m.id},'${m.h}','${m.a}')">${m.h.split(' ').pop()}</button>
                        <button class="team-btn ${pick.p1===m.a?'p1-picked':''} ${pick.p2===m.a?'p2-picked':''}" onclick="makePick(${m.id},'${m.a}','${m.h}')">${m.a.split(' ').pop()}</button>
                    </div>
                </div>
            `;
        }).join('');
    }

    function makePick(id, sel, oth) {
        const otherId = myId === 'p1' ? 'p2' : 'p1';
        const updates = {};
        updates[`picks/${id}/${myId}`] = sel;
        updates[`picks/${id}/${otherId}`] = oth;
        db.ref('ipl_battle_2026').update(updates);
    }
    
    // Add logic for reset and resolve as per previous version
</script>
</body>
</html>
