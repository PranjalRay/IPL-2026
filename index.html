<html lang="en">

            --gold: #f59e0b;

            --p2-color: #ff007b;

        body { 
            font-family: 'Outfit', sans-serif; 
            background-color: var(--bg);

                linear-gradient(rgba(18, 113, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(18, 113, 255, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            color: white; 
            margin: 0; 
            padding-bottom: 80px; 
        }
        
        .header { 
            position: sticky; top: 0; z-index: 1000; 
            background: rgba(17, 24, 39, 0.85);
            backdrop-filter: blur(15px);
            padding: 15px; border-bottom: 2px solid var(--gold); 
            display: flex; justify-content: space-around; align-items: center; 
        }

        #status-dot { width: 8px; height: 8px; border-radius: 50%; background: #10b981; display: inline-block; margin-right: 5px; box-shadow: 0 0 8px #10b981; }
        .offline #status-dot { background: #ef4444; box-shadow: 0 0 8px #ef4444; }

        .score-val { font-family: 'Oxanium'; font-size: 2.5rem; font-weight: 700; }
        #p1-display { color: var(--p1-color); text-shadow: 0 0 10px var(--p1-color); } 
        #p2-display { color: var(--p2-color); text-shadow: 0 0 10px var(--p2-color); }
        .label { font-size: 0.7rem; letter-spacing: 2px; color: var(--gold); font-weight: 700; text-transform: uppercase; cursor: pointer; }

        /* Emoji Picker Modal */
        #emoji-modal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(17, 24, 39, 0.95); backdrop-filter: blur(20px);
            padding: 20px; border-radius: 15px; border: 2px solid var(--gold);
            z-index: 2000; text-align: center; box-shadow: 0 0 30px rgba(0,0,0,0.8);
        }
        .emoji-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 15px; }
        .emoji-opt { font-size: 1.5rem; cursor: pointer; padding: 5px; transition: 0.2s; border-radius: 5px; }
        .emoji-opt:hover { background: rgba(255,255,255,0.1); transform: scale(1.2); }

        .search-container { max-width: 1200px; margin: 15px auto; padding: 0 20px; text-align: center; }
        #team-search { 
            width: 100%; max-width: 400px; padding: 12px; border-radius: 30px; border: 1px solid #374151;
            background: var(--card); color: white; font-family: 'Outfit'; outline: none;
        }
        #team-search:focus { border-color: var(--p1-color); box-shadow: 0 0 10px var(--p1-color); }

        .collapsible-stats { max-width: 1200px; margin: 15px auto; padding: 0 20px; }
        .collapsible-stats summary { 
            cursor: pointer; background: rgba(31, 41, 55, 0.7); padding: 12px; border-radius: 8px; 
            border: 1px solid #374151; list-style: none; text-align: center; font-family: 'Oxanium'; font-weight: bold;
        }
        .stats-grid-box { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 15px; margin-top: 10px; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 8px;
        }
        
        .form-row { display: flex; gap: 5px; justify-content: center; margin-top: 10px; }
        .form-circle { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; color: white; border: 1px solid rgba(255,255,255,0.1); }
        .form-W { background: #10b981; box-shadow: 0 0 5px #10b981; } 
        .form-L { background: #ef4444; } 
        .form-NR { background: #6b7280; }
        .form-empty { border: 1px dashed #4b5563; color: #4b5563; }

        table { width: 100%; border-collapse: collapse; font-family: 'Oxanium'; font-size: 0.85rem; }
        th { border-bottom: 2px solid #374151; padding: 12px; color: var(--gold); text-align: left; background: rgba(31, 41, 55, 0.5); }
        td { padding: 12px; border-bottom: 1px solid rgba(55, 65, 81, 0.3); }
        .team-name-link { cursor: pointer; transition: 0.2s; }
        .team-name-link:hover { text-shadow: 0 0 8px currentColor; }
        .nrr-btn { background: #374151; color: var(--p1-color); border: none; border-radius: 4px; padding: 2px 5px; cursor: pointer; font-size: 0.6rem; margin-left: 5px; }

        .container { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; padding: 20px; max-width: 1200px; margin: 0 auto; }
        .match-card { 
            background: var(--card); border-radius: 12px; padding: 20px; 
            border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(8px);
            transition: 0.4s; position: relative;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3), 0 0 10px var(--team-glow, transparent);
        }
        .match-card:hover { transform: translateY(-5px); }

        .match-card.finished-win { border-color: #10b981; background: rgba(16, 185, 129, 0.15); }
        .match-card.finished-loss { border-color: #ef4444; background: rgba(239, 68, 68, 0.15); }
        .match-card.finished-rain { border-color: #6b7280; background: rgba(107, 114, 128, 0.15); }

        .team-row { display: flex; gap: 10px; margin: 15px 0; }
        .team-btn { flex: 1; padding: 12px 5px; border: 2px solid #374151; border-radius: 8px; background: #1f2937; color: white; cursor: pointer; font-family: 'Oxanium'; font-size: 0.8rem; }
        .p1-picked { border-color: var(--p1-color) !important; background: #002a2e !important; box-shadow: 0 0 12px var(--p1-color); }
        .p2-picked { border-color: var(--p2-color) !important; background: #2e001a !important; box-shadow: 0 0 12px var(--p2-color); }

        .result-btn { width: 100%; padding: 12px; background: var(--gold); border: none; border-radius: 6px; font-family: 'Oxanium'; font-weight: bold; cursor: pointer; color: #060b1a; }
        .result-btn:disabled { background: #1f2937; color: #4b5563; cursor: not-allowed; }
        
        #btn-top { 
            position: fixed; bottom: 20px; right: 20px; background: var(--gold); border: none; 
            width: 60px; height: 60px; border-radius: 50%; font-size: 35px; /* LARGER ARROW */
            cursor: pointer; display: none; z-index: 999; box-shadow: 0 0 15px var(--gold); 
        }
        .footer-tools { text-align: center; margin-top: 40px; opacity: 0.3; font-size: 0.7rem; }
    </style>
</head>

        document.getElementById('points-body').innerHTML = sorted.map(t => `
            <tr>
                <td class="team-name-link" style="color:${teamColors[t]}; font-weight:600" onclick="filterByTeam('${t}')">${t.split(' ').pop()}</td>
                <td>${table[t].p}</td><td>${table[t].w}</td><td>${table[t].l}</td>
                <td style="color:var(--gold); font-weight:bold;">${table[t].pts}</td>
                <td><span style="font-size:0.7rem; color:var(--p1-color);">${nrrData[t] || '0.000'}</span> <button class="nrr-btn" onclick="updateNRR('${t}')">✎</button></td>
            </tr>
        `).join('');

        document.getElementById('grid').innerHTML = matches
        .filter(m => m.h.toLowerCase().includes(searchTerm) || m.a.toLowerCase().includes(searchTerm) || m.id.toString() === searchTerm)
        .map(m => {
            const pick = picks[m.id] || {};
            const win = results[m.id];
            let state = win ? (pick[myId] === win ? 'finished-win' : (win === 'RAIN' ? 'finished-rain' : 'finished-loss')) : '';
            return `
                <div class="match-card ${state}" style="--team-glow: ${teamColors[m.h]}44">
                    <div class="label" style="font-size:0.6rem; color:#9ca3af">Match ${m.id} • ${m.date}</div>
                    <div class="team-row">
                        <button class="team-btn ${pick.p1===m.h?'p1-picked':''} ${pick.p2===m.h?'p2-picked':''}" onclick="makePick(${m.id},'${m.h}','${m.a}')">${m.h.split(' ').pop()}</button>
                        <button class="team-btn ${pick.p1===m.a?'p1-picked':''} ${pick.p2===m.a?'p2-picked':''}" onclick="makePick(${m.id},'${m.a}','${m.h}')">${m.a.split(' ').pop()}</button>
                    </div>
                    <button class="result-btn" ${win ? 'disabled' : ''} onclick="resolve(${m.id},'${m.h}','${m.a}')">
                        ${win ? 'WINNER: ' + win.split(' ').pop() : 'DECLARE WINNER'}
                    </button>
                </div>
            `;
        }).join('');
    }

    function updateNRR(teamName) {
        const val = prompt(`Enter NRR for ${teamName}:`, "0.000");
        if (val !== null) db.ref('ipl_battle_2026/nrr').update({ [teamName]: parseFloat(val).toFixed(3) });
    }

    function makePick(id, sel, oth) {
        const updates = {};
        updates[`picks/${id}/${myId}`] = sel;
        updates[`picks/${id}/${otherId}`] = oth;
        db.ref('ipl_battle_2026').update(updates);
    }

    function resolve(id, tA, tB) {
        const res = prompt(`Enter Winner: "${tA}", "${tB}", or "RAIN"`);
        if (!res) return;
        db.ref('ipl_battle_2026').once('value', snap => {
            const d = snap.val() || {};
            const p = d.picks ? d.picks[id] : null;
            const updates = {};
            updates[`results/${id}`] = res;
            if (res !== "RAIN" && p) {
                if (p.p1 === res) updates['p1Score'] = (d.p1Score || 0) + 1;
                if (p.p2 === res) updates['p2Score'] = (d.p2Score || 0) + 1;
            }
            db.ref('ipl_battle_2026').update(updates);
        });
    }

    function resetData() {
        if(confirm("Wipe all data?")) db.ref('ipl_battle_2026').set({ p1Score: 0, p2Score: 0, results: {}, nrr: {}, avatars: { p1: '👦', p2: '👨' } });
    }
</script>
</body>
</html>
