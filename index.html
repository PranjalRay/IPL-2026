<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPL 2026 Prediction Pro</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@400;700;800&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --ipl-blue: #001C53;
            --ipl-gold: #D4AF37;
            --ipl-orange: #EF4123;
            --bg-dark: #060b13;
            --card-bg: #111827;
            --p1-color: #3b82f6;
            --p2-color: #ec4899;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: white;
            margin: 0;
            padding: 0;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(0, 28, 83, 0.4) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(239, 65, 35, 0.2) 0%, transparent 50%);
            background-attachment: fixed;
        }

        /* --- STICKY SCOREBOARD --- */
        .header-wrap {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(6, 11, 19, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding: 15px 0;
        }

        .scoreboard {
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        .player-card {
            text-align: center;
            min-width: 150px;
        }

        .player-name {
            font-family: 'Oxanium', sans-serif;
            font-size: 0.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .player-score {
            font-family: 'Oxanium', sans-serif;
            font-size: 3rem;
            font-weight: 800;
            line-height: 1;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: inline-block;
        }

        #p1-score { color: var(--p1-color); text-shadow: 0 0 20px rgba(59, 130, 246, 0.5); }
        #p2-score { color: var(--p2-color); text-shadow: 0 0 20px rgba(236, 72, 153, 0.5); }

        .score-bump {
            transform: scale(1.5) translateY(-10px);
            filter: brightness(1.5);
        }

        .vs-divider {
            font-family: 'Oxanium', sans-serif;
            font-style: italic;
            font-weight: 800;
            color: var(--ipl-gold);
            font-size: 1.5rem;
        }

        /* --- SCHEDULE GRID --- */
        .container {
            max-width: 1100px;
            margin: 40px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 25px;
        }

        .match-card {
            background: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
        }

        .match-card.resolved { opacity: 0.7; pointer-events: none; }

        .m-meta {
            padding: 12px 20px;
            background: rgba(255,255,255,0.03);
            font-size: 0.75rem;
            display: flex;
            justify-content: space-between;
            color: #94a3b8;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .m-venue {
            padding: 5px 20px;
            font-size: 0.7rem;
            color: var(--ipl-gold);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .teams-container {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
        }

        .team-box {
            flex: 1;
            text-align: center;
            padding: 10px;
            cursor: pointer;
            transition: all 0.2s;
            border-radius: 12px;
            border: 2px solid transparent;
        }

        .team-name {
            font-family: 'Oxanium', sans-serif;
            font-weight: 700;
            font-size: 1.2rem;
            display: block;
        }

        /* Player Selection States */
        .team-box.p1-selected { border-color: var(--p1-color); background: rgba(59, 130, 246, 0.1); }
        .team-box.p2-selected { border-color: var(--p2-color); background: rgba(236, 72, 153, 0.1); }
        .team-box.both-selected { 
            background: linear-gradient(45deg, rgba(59, 130, 246, 0.1), rgba(236, 72, 153, 0.1));
            border-color: white; 
        }

        .selection-indicator {
            display: flex;
            justify-content: center;
            gap: 5px;
            margin-top: 5px;
            height: 8px;
        }

        .dot { width: 8px; height: 8px; border-radius: 50%; opacity: 0; }
        .dot.p1 { background: var(--p1-color); box-shadow: 0 0 10px var(--p1-color); }
        .dot.p2 { background: var(--p2-color); box-shadow: 0 0 10px var(--p2-color); }
        .p1-selected .dot.p1, .both-selected .dot.p1 { opacity: 1; }
        .p2-selected .dot.p2, .both-selected .dot.p2 { opacity: 1; }

        /* Admin / Results Area */
        .admin-pane {
            padding: 15px 20px;
            background: rgba(0,0,0,0.2);
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        .declare-btn {
            width: 100%;
            padding: 10px;
            border-radius: 10px;
            border: none;
            background: var(--ipl-gold);
            color: black;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
            font-family: 'Oxanium';
        }

        .declare-btn:hover { background: white; }

        .winner-banner {
            text-align: center;
            color: #4ade80;
            font-weight: bold;
            display: none;
            padding: 10px;
            font-family: 'Oxanium';
        }

        /* Team Colors Mini Map */
        .team-CSK { color: #fcc50b; }
        .team-MI { color: #004ba0; }
        .team-RCB { color: #d11d26; }
        .team-KKR { color: #3a225d; }
        .team-SRH { color: #ff8228; }
        .team-RR { color: #ea1a85; }
        .team-GT { color: #1b2133; }
        .team-LSG { color: #0057e2; }
        .team-DC { color: #0078bc; }
        .team-PBKS { color: #dd1f2d; }

        @media (max-width: 600px) {
            .scoreboard { padding: 0 10px; }
            .player-score { font-size: 2rem; }
        }
    </style>
</head>

        { id: 64, home: "RR", away: "LSG", date: "19-MAY", venue: "Jaipur", time: "7:30 PM" },
        { id: 65, home: "KKR", away: "MI", date: "20-MAY", venue: "Kolkata", time: "7:30 PM" },

    // State
    let picks = JSON.parse(localStorage.getItem('ipl_picks')) || {}; 
    let scores = JSON.parse(localStorage.getItem('ipl_scores')) || { p1: 0, p2: 0 };
    let resolved = JSON.parse(localStorage.getItem('ipl_resolved')) || [];

    function init() {
        updateScoreboard();
        const grid = document.getElementById('match-grid');
        
        matches.forEach(m => {
            const isResolved = resolved.includes(m.id);
            const mPicks = picks[m.id] || { p1: null, p2: null };
            
            const card = document.createElement('div');
            card.className = `match-card ${isResolved ? 'resolved' : ''}`;
            card.id = `card-${m.id}`;
            
            card.innerHTML = `
                <div class="m-meta">
                    <span>MATCH ${m.id}</span>
                    <span>${m.date} • ${m.time}</span>
                </div>
                <div class="m-venue">${m.venue}</div>
                <div class="teams-container">
                    <div class="team-box ${getSelectionClass(m.id, m.home)}" onclick="makePick(${m.id}, '${m.home}')">
                        <span class="team-name team-${m.home}">${m.home}</span>
                        <div class="selection-indicator"><div class="dot p1"></div><div class="dot p2"></div></div>
                    </div>
                    <div class="vs-divider">VS</div>
                    <div class="team-box ${getSelectionClass(m.id, m.away)}" onclick="makePick(${m.id}, '${m.away}')">
                        <span class="team-name team-${m.away}">${m.away}</span>
                        <div class="selection-indicator"><div class="dot p1"></div><div class="dot p2"></div></div>
                    </div>
                </div>
                <div class="admin-pane">
                    <div id="winner-banner-${m.id}" class="winner-banner"></div>
                    <button class="declare-btn" id="btn-${m.id}" onclick="declareWinner(${m.id})">Declare Result</button>
                </div>
            `;
            grid.appendChild(card);
            if(isResolved) showResolution(m.id);
        });
    }

    function getSelectionClass(matchId, team) {
        const p = picks[matchId];
        if(!p) return '';
        if(p.p1 === team && p.p2 === team) return 'both-selected';
        if(p.p1 === team) return 'p1-selected';
        if(p.p2 === team) return 'p2-selected';
        return '';
    }

    window.makePick = function(matchId, team) {
        if(resolved.includes(matchId)) return;
        
        if(!picks[matchId]) picks[matchId] = { p1: null, p2: null };
        
        // Simple toggle logic: Player 1 picks first, then Player 2
        if(!picks[matchId].p1) {
            picks[matchId].p1 = team;
        } else if(!picks[matchId].p2) {
            picks[matchId].p2 = team;
        } else {
            // Reset if both already picked to allow change
            picks[matchId] = { p1: team, p2: null };
        }
        
        saveAndRefresh();
    };

    window.declareWinner = function(matchId) {
        const m = matches.find(x => x.id === matchId);
        const p = picks[matchId];
        
        if(!p || !p.p1 || !p.p2) {
            alert("Both players must pick a team first!");
            return;
        }

        // Prompt for actual winner
        const winTeam = confirm(`Did ${m.home} win? (Cancel for ${m.away})`) ? m.home : m.away;
        
        if(p.p1 === winTeam) {
            scores.p1++;
            animateScore('p1-score');
        }
        if(p.p2 === winTeam) {
            scores.p2++;
            animateScore('p2-score');
        }

        resolved.push(matchId);
        localStorage.setItem('winner_' + matchId, winTeam);
        saveAndRefresh();
    }

    function showResolution(matchId) {
        const winTeam = localStorage.getItem('winner_' + matchId);
        const banner = document.getElementById(`winner-banner-${matchId}`);
        const btn = document.getElementById(`btn-${matchId}`);
        if(banner) {
            banner.style.display = 'block';
            banner.innerText = `WINNER: ${winTeam}`;
            btn.style.display = 'none';
        }
    }

    function animateScore(id) {
        const el = document.getElementById(id);
        el.classList.add('score-bump');
        setTimeout(() => el.classList.remove('score-bump'), 400);
    }

    function updateScoreboard() {
        document.getElementById('p1-score').innerText = scores.p1;
        document.getElementById('p2-score').innerText = scores.p2;
    }

    function saveAndRefresh() {
        localStorage.setItem('ipl_picks', JSON.stringify(picks));
        localStorage.setItem('ipl_scores', JSON.stringify(scores));
        localStorage.setItem('ipl_resolved', JSON.stringify(resolved));
        document.getElementById('match-grid').innerHTML = '';
        init();
    }

    init();
</script>
