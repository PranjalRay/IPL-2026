<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPL 2026 Tracker - Full Season</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@400;700&family=Outfit:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #060b1a; --card: #111827; --gold: #f59e0b;
            --p1-color: #00f2ff; --p2-color: #ff007b;
        }
        
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: white; margin: 0; padding-bottom: 80px; }
        
        .header { 
            position: sticky; top: 0; z-index: 1000; background: #111827;
            padding: 15px; border-bottom: 2px solid var(--gold); 
            display: flex; justify-content: space-around; align-items: center; 
        }

        .score-val { font-family: 'Oxanium'; font-size: 2.5rem; font-weight: 700; }
        #p1-display { color: var(--p1-color); } 
        #p2-display { color: var(--p2-color); }
        .label { font-size: 0.7rem; letter-spacing: 2px; color: var(--gold); font-weight: 700; text-transform: uppercase; }

        /* Collapsibles */
        .collapsible-stats { max-width: 1200px; margin: 15px auto; padding: 0 20px; }
        .collapsible-stats summary { 
            cursor: pointer; background: #1f2937; padding: 12px; border-radius: 8px; 
            border: 1px solid #374151; list-style: none; text-align: center; font-family: 'Oxanium'; font-weight: bold;
        }
        .stats-grid-box { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 15px; margin-top: 10px; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 8px;
        }
        
        .form-row { display: flex; gap: 5px; justify-content: center; margin-top: 10px; }
        .form-circle { 
            width: 22px; height: 22px; border-radius: 50%; display: flex; 
            align-items: center; justify-content: center; font-size: 10px; font-weight: bold; color: white;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .form-W { background: #10b981; box-shadow: 0 0 5px #10b981; } 
        .form-L { background: #ef4444; } 
        .form-NR { background: #6b7280; }
        .form-empty { border: 1px dashed #4b5563; color: #4b5563; }

        /* Points Table */
        table { width: 100%; border-collapse: collapse; font-family: 'Oxanium'; font-size: 0.85rem; background: #111827; }
        th { border-bottom: 2px solid #374151; padding: 12px; color: var(--gold); text-align: left; background: #1f2937; }
        td { padding: 12px; border-bottom: 1px solid #1f2937; }
        .nrr-btn { background: #374151; color: var(--p1-color); border: none; border-radius: 4px; padding: 2px 5px; cursor: pointer; font-size: 0.6rem; margin-left: 5px; font-family: 'Oxanium'; }

        /* Match Cards Grid */
        .container { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; padding: 20px; max-width: 1200px; margin: 0 auto; }
        .match-card { background: var(--card); border-radius: 12px; padding: 20px; border: 1px solid #1f2937; transition: 0.3s; }
        
        /* Win/Loss Card Colors */
        .match-card.finished-win { border-color: #10b981; background: rgba(16, 185, 129, 0.08); }
        .match-card.finished-loss { border-color: #ef4444; background: rgba(239, 68, 68, 0.08); }
        .match-card.finished-rain { border-color: #6b7280; background: rgba(107, 114, 128, 0.08); }

        .team-row { display: flex; gap: 10px; margin: 15px 0; }
        .team-btn { 
            flex: 1; padding: 12px 5px; border: 2px solid #374151; border-radius: 8px; 
            background: #1f2937; color: white; cursor: pointer; font-family: 'Oxanium'; font-size: 0.8rem;
        }
        .p1-picked { border-color: var(--p1-color) !important; background: #002a2e !important; box-shadow: 0 0 8px var(--p1-color); }
        .p2-picked { border-color: var(--p2-color) !important; background: #2e001a !important; box-shadow: 0 0 8px var(--p2-color); }

        .result-btn { width: 100%; padding: 12px; background: var(--gold); border: none; border-radius: 6px; font-family: 'Oxanium'; font-weight: bold; cursor: pointer; color: #060b1a; }
        .result-btn:disabled { background: #1f2937; color: #4b5563; cursor: not-allowed; }
        
        #btn-top { position: fixed; bottom: 20px; right: 20px; background: var(--gold); border: none; padding: 10px 15px; border-radius: 50%; font-weight: bold; cursor: pointer; display: none; z-index: 999; }
        .footer-tools { text-align: center; margin-top: 40px; opacity: 0.3; font-size: 0.7rem; }
    </style>
</head>
<body>

<div class="header">
    <div class="score-box" style="text-align:center">
        <div class="label">SON</div>
        <div id="p1-display" class="score-val">0</div>
    </div>
    <div style="font-family:'Oxanium'; font-weight:bold; color:var(--gold)">VS</div>
    <div class="score-box" style="text-align:center">
        <div class="label">FATHER</div>
        <div id="p2-display" class="score-val">0</div>
    </div>
</div>

<details class="collapsible-stats">
    <summary>📊 BATTLE STATISTICS & FORM</summary>
    <div class="stats-grid-box">
        <div style="text-align: center; border: 1px solid #374151; padding: 15px; border-radius: 8px;">
            <div class="label">MY BATTLE WIN %</div>
            <div id="win-pct" style="font-size: 2rem; font-family: 'Oxanium'; color: var(--p1-color); margin-top: 5px;">0%</div>
        </div>
        <div style="text-align: center; border: 1px solid #374151; padding: 15px; border-radius: 8px;">
            <div class="label">MY LAST 5 (BATTLE)</div>
            <div id="user-history" class="form-row"></div>
        </div>
        <div style="text-align: center; border: 1px solid #374151; padding: 15px; border-radius: 8px;">
            <div class="label">TEAM FORM (LAST 5)</div>
            <div style="display:flex; flex-direction: column; gap: 15px; margin-top: 15px;">
                <div>
                    <div style="font-size: 0.7rem; color:#ff822a; font-weight:bold;">SRH</div>
                    <div id="srh-form" class="form-row" style="margin-top: 5px;"></div>
                </div>
                <div>
                    <div style="font-size: 0.7rem; color:#b886ee; font-weight:bold;">KKR</div>
                    <div id="kkr-form" class="form-row" style="margin-top: 5px;"></div>
                </div>
            </div>
        </div>
    </div>
</details>

<details class="collapsible-stats">
    <summary>🏆 SEASON POINTS TABLE</summary>
    <div style="margin-top: 10px; border: 1px solid #374151; border-radius: 8px; overflow: hidden;">
        <table>
            <thead><tr><th>TEAM</th><th>P</th><th>W</th><th>L</th><th>PTS</th><th>NRR</th></tr></thead>
            <tbody id="points-body"></tbody>
        </table>
    </div>
</details>

<div id="grid" class="container"></div>

<button id="btn-top" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">↑</button>

<div class="footer-tools">
    <button onclick="resetData()" style="background:none; border:none; color:red; cursor:pointer;">Reset All Battle Data</button>

        { id: 70, date: "24-MAY-26", h: "Kolkata Knight Riders", a: "Delhi Capitals" }
    ];

    db.ref('ipl_battle_2026').on('value', snap => {
        const data = snap.val() || {};
        render(data);
    });

    window.onscroll = function() {
        document.getElementById("btn-top").style.display = window.scrollY > 500 ? "block" : "none";
    };

    function render(data) {
        const results = data.results || {};
        const picks = data.picks || {};
        const nrrData = data.nrr || {};
        const p1Score = data.p1Score || 0;
        const p2Score = data.p2Score || 0;

        document.getElementById('p1-display').innerText = p1Score;
        document.getElementById('p2-display').innerText = p2Score;

        let table = {};
        let srhH = [], kkrH = [], userH = [];
        Object.keys(teamColors).forEach(t => table[t] = { p: 0, w: 0, l: 0, pts: 0 });

        matches.forEach(m => {
            const res = results[m.id];
            if (!res) return;

            table[m.h].p++; table[m.a].p++;
            if (res === "RAIN") {
                table[m.h].pts++; table[m.a].pts++;
                if(m.h.includes("Hyderabad") || m.a.includes("Hyderabad")) srhH.push('NR');
                if(m.h.includes("Kolkata") || m.a.includes("Kolkata")) kkrH.push('NR');
            } else {
                table[res].w++; table[res].pts += 2;
                const loser = res === m.h ? m.a : m.h;
                table[loser].l++;
                
                if (m.h.includes("Hyderabad") || m.a.includes("Hyderabad")) srhH.push(res.includes("Hyderabad") ? 'W' : 'L');
                if (m.h.includes("Kolkata") || m.a.includes("Kolkata")) kkrH.push(res.includes("Kolkata") ? 'W' : 'L');
                
                const myPick = picks[m.id] ? picks[m.id][myId] : null;
                if(myPick) userH.push(myPick === res ? 'W' : 'L');
            }
        });

        const myActualScore = myId === 'p1' ? p1Score : p2Score;
        const totalPlayed = Object.keys(results).length;
        document.getElementById('win-pct').innerText = totalPlayed > 0 ? Math.round((myActualScore / totalPlayed) * 100) + "%" : "0%";

        const genCircles = (arr) => {
            let last5 = arr.slice(-5);
            while(last5.length < 5) last5.push('empty');
            return last5.map(r => `<div class="form-circle form-${r}">${r === 'empty' ? '-' : r[0]}</div>`).join('');
        };
        document.getElementById('user-history').innerHTML = genCircles(userH);
        document.getElementById('srh-form').innerHTML = genCircles(srhH);
        document.getElementById('kkr-form').innerHTML = genCircles(kkrH);

        const sorted = Object.keys(table).sort((a,b) => (table[b].pts - table[a].pts) || (parseFloat(nrrData[b]||0) - parseFloat(nrrData[a]||0)));
        
        document.getElementById('points-body').innerHTML = sorted.map(t => `
            <tr>
                <td style="color:${teamColors[t]}; font-weight:600">${t.split(' ').pop()}</td>
                <td>${table[t].p}</td>
                <td>${table[t].w}</td>
                <td>${table[t].l}</td>
                <td style="color:var(--gold); font-weight:bold;">${table[t].pts}</td>

            </tr>
        `).join('');

        document.getElementById('grid').innerHTML = matches.map(m => {
            const pick = picks[m.id] || {};
            const win = results[m.id];
            
            // LOGIC FOR WIN/LOSS CARD COLORS
            let cardStateClass = '';
            if (win) {
                if (pick[myId] === win) {
                    cardStateClass = 'finished-win';
                } else if (win === 'RAIN') {
                    cardStateClass = 'finished-rain';
                } else {
                    cardStateClass = 'finished-loss';
                }
            }

            return `
                <div class="match-card ${cardStateClass}">
                    <div class="label" style="font-size:0.6rem; color:#9ca3af">Match ${m.id} • ${m.date}</div>
                    <div class="team-row">
                        <button class="team-btn ${pick.p1===m.h?'p1-picked':''} ${pick.p2===m.h?'p2-picked':''}" onclick="makePick(${m.id},'${m.h}','${m.a}')">${m.h.split(' ').pop()}</button>
                        <button class="team-btn ${pick.p1===m.a?'p1-picked':''} ${pick.p2===m.a?'p2-picked':''}" onclick="makePick(${m.id},'${m.a}','${m.h}')">${m.a.split(' ').pop()}</button>
                    </div>
                    <button class="result-btn" ${win ? 'disabled' : ''} onclick="resolve(${m.id},'${m.h}','${m.a}')">
                        ${win ? 'WINNER: ' + win.split(' ').pop() : 'DECLARE WINNER'}
                    </button>
                </div>
            `;
        }).join('');
    }

    function updateNRR(teamName) {
        const val = prompt(`Enter NRR for ${teamName}:`, "0.000");
        if (val === null) return;
        db.ref('ipl_battle_2026/nrr').update({ [teamName]: parseFloat(val).toFixed(3) });
    }

    function makePick(id, sel, oth) {
        const updates = {};
        updates[`picks/${id}/${myId}`] = sel;
        updates[`picks/${id}/${otherId}`] = oth;
        db.ref('ipl_battle_2026').update(updates);
    }

    function resolve(id, tA, tB) {
        const res = prompt(`Enter Winner: "${tA}", "${tB}", or "RAIN"`);
        if (!res) return;
        const norm = res.trim();
        db.ref('ipl_battle_2026').once('value', snap => {
            const d = snap.val() || {};
            const p = d.picks ? d.picks[id] : null;
            const updates = {};
            updates[`results/${id}`] = norm;
            
            if (norm !== "RAIN" && p) {
                if (p.p1 === norm) updates['p1Score'] = (d.p1Score || 0) + 1;
                if (p.p2 === norm) updates['p2Score'] = (d.p2Score || 0) + 1;
            }
            db.ref('ipl_battle_2026').update(updates);
        });
    }

    function resetData() {
        if(confirm("Are you sure you want to wipe all match results and scores?")) {
            db.ref('ipl_battle_2026').set({ p1Score: 0, p2Score: 0, results: {}, nrr: {} });
        }
    }
</script>
</body>
</html>
