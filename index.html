function render() {
    db.ref('ipl2026').on('value', snap => {
        const data = snap.val() || {matches: {}};
        let fW = 0, sW = 0;
        
        document.getElementById('matches-container').innerHTML = matches.map(m => {
            const mRef = data.matches[m.id] || {};
            const fatherPick = mRef.picks?.Father || "";
            const sonPick = mRef.picks?.Son || "";
            const winner = mRef.winner || "";

            if(winner) {
                if(fatherPick === winner) fW++;
                if(sonPick === winner) sW++;
            }

            return `
                <div class="match-card">
                    <small>${m.date} | ${m.v}</small>
                    <p><strong>${m.h} vs ${m.a}</strong></p>
                    <div style="display:flex; justify-content:space-between">
                        <button class="btn ${mRef.picks?.[currentUser] === m.h ? 'active' : ''}" onclick="pick(${m.id}, '${m.h}')">${m.h.split(' ').pop()}</button>
                        <button class="btn ${mRef.picks?.[currentUser] === m.a ? 'active' : ''}" onclick="pick(${m.id}, '${m.a}')">${m.a.split(' ').pop()}</button>
                    </div>
                    ${winner ? `<p style="color:var(--accent)">Result: ${winner} won!</p>` : ''}
                </div>`;
        }).join('');
        document.getElementById('f-wins').innerText = fW;
        document.getElementById('s-wins').innerText = sW;
    });
}

function pick(id, team) { db.ref(`ipl2026/matches/${id}/picks/${currentUser}`).set(team); }

function openAdmin() {
    const id = prompt("Enter Match ID to set result:");
    const win = prompt("Enter Winning Team Name:");
    if(id && win) db.ref(`ipl2026/matches/${id}/winner`).set(win);
}
