<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPL 2026 - Live Multiplayer Predictor</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@400;700;800&family=Outfit:wght@300;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --ipl-blue: #001C53; --ipl-gold: #D4AF37; --bg: #040812;
            --p1-neon: #00f2ff; --p2-neon: #ff007b;
        }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: white; margin: 0; }
        .sticky-header { position: sticky; top: 0; z-index: 1000; background: rgba(15,23,42,0.9); backdrop-filter: blur(10px); border-bottom: 2px solid var(--ipl-gold); padding: 20px; text-align: center; }
        .scoreboard { display: flex; justify-content: space-around; max-width: 1200px; margin: 0 auto; align-items: center; }
        .score-val { font-family: 'Oxanium'; font-size: 3rem; font-weight: 800; transition: transform 0.3s; }
        #p1-score { color: var(--p1-neon); } #p2-score { color: var(--p2-neon); }
        .container { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 20px; padding: 20px; max-width: 1200px; margin: 0 auto; }
        .match-card { background: #0f172a; border-radius: 15px; padding: 15px; border: 1px solid #1e293b; position: relative; }
        .teams { display: flex; justify-content: space-between; gap: 10px; align-items: center; margin: 15px 0; }
        .team-btn { flex: 1; padding: 12px; border: 2px solid #1e293b; border-radius: 8px; cursor: pointer; text-align: center; font-family: 'Oxanium'; font-weight: bold; transition: 0.2s; }
        
        /* Player Selection Styles */
        .p1-picked { border-color: var(--p1-neon); box-shadow: inset 0 0 10px rgba(0,242,255,0.2); }
        .p2-picked { border-color: var(--p2-neon); box-shadow: inset 0 0 10px rgba(255,0,123,0.2); }
        .both-picked { border-image: linear-gradient(to right, var(--p1-neon), var(--p2-neon)) 1; }

        .btn-fetch { width: 100%; padding: 10px; background: var(--ipl-gold); border: none; font-weight: bold; border-radius: 5px; cursor: pointer; color: black; }
        .resolved { opacity: 0.5; pointer-events: none; }
        .player-toggle { margin-bottom: 10px; font-size: 0.8rem; color: var(--ipl-gold); }
    </style>
</head>
<body>

<div class="sticky-header">
    <div class="player-toggle">CURRENTLY PLAYING AS: <span id="current-player-label">PLAYER 1</span> 
        <button onclick="togglePlayer()" style="font-size: 0.6rem; margin-left: 10px; padding: 2px 5px;">SWITCH</button>
    </div>
    <div class="scoreboard">
        <div><div style="font-size: 0.7rem;">PLAYER 1</div><div id="p1-score" class="score-val">0</div></div>
        <div style="color: var(--ipl-gold); font-weight: bold;">LIVE BATTLE</div>
        <div><div style="font-size: 0.7rem;">PLAYER 2</div><div id="p2-score" class="score-val">0</div></div>
    </div>
</div>

<div id="schedule-grid" class="container"></div>

<script>
    // YOUR FINAL INTEGRATED SECRETS
    const firebaseConfig = {
        apiKey: "AIzaSyCLQleq0qO6RQHBA-gqvJDmgrMXQQRSUYg",
        authDomain: "ipl-2026-dd5d0.firebaseapp.com",
        projectId: "ipl-2026-dd5d0",
        storageBucket: "ipl-2026-dd5d0.firebasestorage.app",
        messagingSenderId: "595437597357",
        appId: "1:595437597357:web:fba3115ee06d10d9b90c24",
        measurementId: "G-3JRP3HMQDT",
        databaseURL: "https://ipl-2026-dd5d0-default-rtdb.asia-southeast1.firebasedatabase.app/"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let currentPlayer = 'p1'; // Toggle this to act as Player 1 or Player 2

    const schedule = [
        { id: 1, date: "2026-03-28", home: "RCB", away: "SRH", venue: "Bengaluru" },
        { id: 2, date: "2026-03-29", home: "MI", away: "KKR", venue: "Mumbai" },
        { id: 3, date: "2026-03-30", home: "RR", away: "CSK", venue: "Guwahati" }
    ];

    function togglePlayer() {
        currentPlayer = (currentPlayer === 'p1') ? 'p2' : 'p1';
        document.getElementById('current-player-label').innerText = currentPlayer.toUpperCase();
    }

    // Realtime Listener
    db.ref('ipl_data').on('value', (snapshot) => {
        const data = snapshot.val() || { picks: {}, resolved: [], p1Score: 0, p2Score: 0 };
        renderUI(data);
    });

    function renderUI(data) {
        document.getElementById('p1-score').innerText = data.p1Score || 0;
        document.getElementById('p2-score').innerText = data.p2Score || 0;
        
        const grid = document.getElementById('schedule-grid');
        grid.innerHTML = '';

        schedule.forEach(m => {
            const mPicks = (data.picks && data.picks[m.id]) ? data.picks[m.id] : { p1: null, p2: null };
            const isResolved = (data.resolved || []).includes(m.id);

            const card = document.createElement('div');
            card.className = `match-card ${isResolved ? 'resolved' : ''}`;
            
            // Logic for visual indicators
            const p1Home = mPicks.p1 === m.home;
            const p2Home = mPicks.p2 === m.home;
            const p1Away = mPicks.p1 === m.away;
            const p2Away = mPicks.p2 === m.away;

            card.innerHTML = `
                <div style="font-size: 0.7rem; color: #64748b;">MATCH ${m.id} • ${m.date}</div>
                <div class="teams">
                    <div class="team-btn ${p1Home ? 'p1-picked' : ''} ${p2Home ? 'p2-picked' : ''}" 
                         onclick="makePick(${m.id}, '${m.home}')">${m.home}</div>
                    <div style="padding: 0 5px; color: #475569; font-size: 0.8rem;">VS</div>
                    <div class="team-btn ${p1Away ? 'p1-picked' : ''} ${p2Away ? 'p2-picked' : ''}" 
                         onclick="makePick(${m.id}, '${m.away}')">${m.away}</div>
                </div>
                <button class="btn-fetch" onclick="checkMatchResult(${m.id})">
                    ${isResolved ? 'RESULT DECLARED' : 'CHECK RESULT'}
                </button>
            `;
            grid.appendChild(card);
        });
    }

    function makePick(matchId, teamChosen) {
        // Only updates the specific player's slot in the DB
        db.ref(`ipl_data/picks/${matchId}/${currentPlayer}`).set(teamChosen);
    }

    async function checkMatchResult(matchId) {
        const match = schedule.find(x => x.id === matchId);
        const winner = match.home; // Simulation logic: Home team always wins for now

        db.ref('ipl_data').once('value', snapshot => {
            let data = snapshot.val() || { picks: {}, resolved: [], p1Score: 0, p2Score: 0 };
            let picks = data.picks ? data.picks[matchId] : null;
            
            if(!picks || (!picks.p1 && !picks.p2)) return alert("No picks made for this match!");
            if(data.resolved && data.resolved.includes(matchId)) return;

            let newP1 = data.p1Score || 0;
            let newP2 = data.p2Score || 0;
            let resList = data.resolved || [];

            if(picks.p1 === winner) newP1++;
            if(picks.p2 === winner) newP2++;
            resList.push(matchId);

            db.ref('ipl_data').update({
                p1Score: newP1,
                p2Score: newP2,
                resolved: resList
            });
        });
    }
</script>
</body>
</html>
