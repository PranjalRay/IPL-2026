        :root {
            --bg: #060b1a; --card: #111827; --gold: #f59e0b;
            --p1-color: #00f2ff; --p2-color: #ff007b;
        }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: white; margin: 0; }
        
        .header { 
            position: sticky; top: 0; z-index: 100; background: rgba(17, 24, 39, 0.95);
            padding: 15px; border-bottom: 2px solid var(--gold); display: flex;
            justify-content: space-around; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .score-box { text-align: center; }
        .score-val { font-family: 'Oxanium'; font-size: 3rem; font-weight: 700; line-height: 1; }
        #p1-display { color: var(--p1-color); } #p2-display { color: var(--p2-color); }
        .label { font-size: 0.7rem; letter-spacing: 2px; color: var(--gold); }

        .container { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); 
            gap: 20px; padding: 20px; max-width: 1200px; margin: 0 auto; 
        }

        .match-card { 
            background: var(--card); border-radius: 12px; padding: 20px;
            border: 1px solid #1f2937; position: relative; transition: transform 0.2s;
        }
        .match-card.finished { border-color: #10b981; background: #06110e; opacity: 0.9; }
        
        .date { font-size: 0.8rem; color: #9ca3af; margin-bottom: 5px; font-family: 'Oxanium'; }
        .venue { font-size: 0.7rem; color: var(--gold); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
        
        .vs-container { display: flex; align-items: center; justify-content: space-between; margin: 15px 0; }
        .team-btn { 
            flex: 1; padding: 12px 5px; border: 2px solid #374151; border-radius: 8px;
            background: #1f2937; color: white; cursor: pointer; font-weight: 700;
            transition: 0.3s; font-family: 'Oxanium'; font-size: 0.8rem;
        }
        
        .p1-picked { border-color: var(--p1-color); box-shadow: 0 0 10px var(--p1-color); background: #002a2e; }
        .p2-picked { border-color: var(--p2-color); box-shadow: 0 0 10px var(--p2-color); background: #2e001a; }
        
        .verify-btn { 
            width: 100%; padding: 10px; margin-top: 15px; border: none;
            border-radius: 6px; font-family: 'Oxanium'; font-weight: 700;
            background: var(--gold); color: #000; cursor: pointer;
        }
        .verify-btn:disabled { background: #374151; color: #9ca3af; cursor: not-allowed; }
        
        .winner-banner { 
            text-align: center; margin-top: 10px; color: var(--gold); 
            font-weight: 700; font-size: 0.9rem; border-top: 1px dashed #374151; padding-top: 8px;
        }

        .live-section { max-width: 1200px; margin: 20px auto; padding: 0 20px; }
    </style>
</head>

    function render(data) {
        document.getElementById('p1-display').innerText = data.p1Score || 0;
        document.getElementById('p2-display').innerText = data.p2Score || 0;
        
        const grid = document.getElementById('grid');
        const fragment = document.createDocumentFragment();

        matches.forEach(m => {
            const pick = data.picks[m.id] || {};
            const winner = data.results[m.id];
            const isDone = !!winner;
            const homeColor = teamColors[m.h] || '#1f2937';

            const card = document.createElement('div');
            card.className = `match-card ${isDone ? 'finished' : ''}`;
            card.style.borderLeft = `6px solid ${homeColor}`;
            
            card.innerHTML = `
                <div class="date">MATCH ${m.id} • ${m.date}</div>
                <div class="venue">${m.v}</div>
                <div class="vs-container">
                    <button type="button" class="team-btn ${pick.p1 === m.h ? 'p1-picked' : ''} ${pick.p2 === m.h ? 'p2-picked' : ''}"

                </div>
                <button type="button" class="verify-btn" ${isDone ? 'disabled' : ''} onclick="autoVerifyWinner(${m.id}, '${m.h}', '${m.a}')">

                </button>
                ${isDone ? `<div class="winner-banner">🏆 WINNER: ${winner}</div>` : ''}
            `;
            fragment.appendChild(card);
        });

        grid.innerHTML = '';
        grid.appendChild(fragment);

    function makePick(matchId, selected, other) {
        const updates = {};
        updates[`picks/${matchId}/${myId}`] = selected;
        updates[`picks/${matchId}/${otherId}`] = other;
        db.ref('ipl_battle_2026').update(updates);
    }

    async function autoVerifyWinner(matchId, teamA, teamB) {
        try {
            const response = await fetch(`https://api.cricapi.com/v1/currentMatches?apikey=${CRICKET_API_KEY}&offset=0`);
            const result = await response.json();
            
            if (result.status !== "success") {
                alert("API Error: " + result.reason);
                return;
            }

            // Find match by comparing team names
            const liveMatch = result.data.find(m => 
                (m.name.includes(teamA) && m.name.includes(teamB))
            );

            if (liveMatch && liveMatch.matchFinished) {
                // Determine winner from status string (e.g. "Mumbai Indians won by 5 wickets")
                const apiWinner = liveMatch.status.split(" won")[0]; 
                const finalWinner = apiWinner.includes(teamA) ? teamA : teamB;
                
                finalizeWinner(matchId, finalWinner);
            } else {
                alert("Match is either not finished or not found in live data yet.");
            }
        } catch (error) {
            console.error("API Fetch Failed:", error);
            alert("Failed to connect to Live API. Try manual verification later.");
        }
    }

    function finalizeWinner(matchId, winner) {
        db.ref('ipl_battle_2026').once('value', (snap) => {
            const data = snap.val() || { picks: {}, results: {}, p1Score: 0, p2Score: 0 };
            const matchPicks = data.picks ? data.picks[matchId] : null;
            
            if (!matchPicks) {
                alert("No picks found for this match!");
                return;
            }

            const updates = {};
            updates[`results/${matchId}`] = winner;
            updates[`p1Score`] = (data.p1Score || 0) + (matchPicks.p1 === winner ? 1 : 0);
            updates[`p2Score`] = (data.p2Score || 0) + (matchPicks.p2 === winner ? 1 : 0);
            
            db.ref('ipl_battle_2026').update(updates);
        });
    }
