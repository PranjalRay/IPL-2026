<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPL 2026 Tracker - Son vs Father</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@400;700&family=Outfit:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #060b1a; --card: #111827; --gold: #f59e0b;
            --p1-color: #00f2ff; --p2-color: #ff007b;
        }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: white; margin: 0; padding-bottom: 80px; }
        
        .header { 
            position: sticky; top: 0; z-index: 100; background: rgba(17, 24, 39, 0.95);
            padding: 15px; border-bottom: 2px solid var(--gold); display: flex;
            justify-content: space-around; align-items: center; backdrop-filter: blur(10px);
        }
        .score-val { font-family: 'Oxanium'; font-size: 2.8rem; font-weight: 700; line-height: 1; }
        #p1-display { color: var(--p1-color); text-shadow: 0 0 10px rgba(0,242,255,0.3); } 
        #p2-display { color: var(--p2-color); text-shadow: 0 0 10px rgba(255,0,123,0.3); }
        .label { font-size: 0.7rem; letter-spacing: 2px; color: var(--gold); font-weight: 700; text-transform: uppercase; }

        details { max-width: 1200px; margin: 15px auto; padding: 0 20px; }
        summary { cursor: pointer; font-family: 'Oxanium'; background: #1f2937; padding: 12px; border-radius: 8px; border: 1px solid var(--gold); list-style: none; text-align: center; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-family: 'Oxanium'; font-size: 0.75rem; background: var(--card); border-radius: 8px; overflow: hidden; }
        th { border-bottom: 2px solid #374151; padding: 12px; color: var(--gold); text-align: left; }
        td { padding: 10px; border-bottom: 1px solid #1f2937; }

        .nrr-btn { background: #374151; color: var(--p1-color); border: none; border-radius: 4px; padding: 2px 5px; cursor: pointer; font-size: 0.6rem; margin-left: 5px; }

        /* Stats & Team History */
        .stats-area { max-width: 1200px; margin: 10px auto; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 20px; }
        .player-stats { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 8px; text-align: center; border: 1px solid #1f2937; min-height: 60px; }
        .form-guide { display: flex; gap: 6px; justify-content: center; margin-top: 10px; }
        .form-circle { width: 14px; height: 14px; border-radius: 50%; background: #374151; display: flex; align-items: center; justify-content: center; font-size: 8px; font-weight: bold; }
        .form-W { background: #10b981; box-shadow: 0 0 8px #10b981; }
        .form-L { background: #ef4444; }
        .form-NR { background: #6b7280; }

        .container { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; padding: 20px; max-width: 1200px; margin: 0 auto; }
        .match-card { background: var(--card); border-radius: 12px; padding: 20px; border: 1px solid #1f2937; transition: 0.3s; }
        .match-card.finished { border-color: #10b981 !important; opacity: 0.9; }
        .vs-container { display: flex; align-items: center; justify-content: space-between; margin: 15px 0; }
        .team-btn { flex: 1; padding: 12px 5px; border: 2px solid #374151; border-radius: 8px; background: #1f2937; color: white; cursor: pointer; font-family: 'Oxanium'; font-size: 0.75rem; }
        .p1-picked { border-color: var(--p1-color) !important; background: #002a2e !important; box-shadow: 0 0 10px var(--p1-color); }
        .p2-picked { border-color: var(--p2-color) !important; background: #2e001a !important; box-shadow: 0 0 10px var(--p2-color); }
        .result-btn { width: 100%; padding: 12px; background: var(--gold); border: none; border-radius: 6px; font-family: 'Oxanium'; font-weight: bold; cursor: pointer; }
        
        .footer-tools { text-align: center; margin-top: 40px; opacity: 0.4; font-size: 0.7rem; }
    </style>
</head>
<body>

<div class="header">
    <div class="score-box">
        <div class="label">SON</div>
        <div id="p1-display" class="score-val">0</div>
    </div>
    <div style="text-align:center"><img src="https://pngimg.com/uploads/cricket/cricket_PNG23.png" width="40"><div class="label" style="font-size:0.5rem">BATTLE</div></div>
    <div class="score-box">
        <div class="label">FATHER</div>
        <div id="p2-display" class="score-val">0</div>
    </div>
</div>

<details>
    <summary>📊 VIEW IPL 2026 POINTS TABLE</summary>

        <thead><tr><th>TEAM</th><th>P</th><th>W</th><th>L</th><th>PTS</th><th>WIN %</th><th>NRR</th></tr></thead>
        <tbody id="points-body"></tbody>
    </table>
</details>

<div class="stats-area">
    <div class="player-stats" style="border-top: 3px solid #ff822a;">
        <div class="label">SRH LAST 5</div>
        <div id="srh-history" class="form-guide"></div>

        <div class="label">KKR LAST 5</div>
        <div id="kkr-history" class="form-guide"></div>
    </div>
</div>

<div id="grid" class="container"></div>

<div class="footer-tools">
    <button onclick="resetData()" style="background:none; border:none; color:red; cursor:pointer; text-decoration: underline;">RESET ALL DATA</button>
</div>

        { id: 68, date: "23-MAY-2026", h: "Lucknow Super Giants", a: "Punjab Kings" },
        { id: 69, date: "24-MAY-2026", h: "Mumbai Indians", a: "Rajasthan Royals" },
        { id: 70, date: "24-MAY-2026", h: "Kolkata Knight Riders", a: "Delhi Capitals" }
    ];

    db.ref('ipl_battle_2026').on('value', snap => {
        const data = snap.val() || {};
        render(data);
    });

    function render(data) {
        const results = data.results || {};
        const picks = data.picks || {};
        const nrrData = data.nrr || {};

        let table = {};
        let srhH = [], kkrH = [];
        Object.keys(teamColors).forEach(t => table[t] = { p: 0, w: 0, l: 0, pts: 0 });

        matches.forEach(m => {
            const res = results[m.id];
            if (!res) return;
            table[m.h].p++; table[m.a].p++;
            if (res === "RAIN") {
                table[m.h].pts++; table[m.a].pts++;
                if(m.h.includes("Hyderabad") || m.a.includes("Hyderabad")) srhH.push('NR');
                if(m.h.includes("Kolkata") || m.a.includes("Kolkata")) kkrH.push('NR');
            } else {
                table[res].w++; table[res].pts += 2;
                const loser = (res === m.h) ? m.a : m.h;
                table[loser].l++;
                if(m.h.includes("Hyderabad") || m.a.includes("Hyderabad")) srhH.push(res.includes("Hyderabad") ? 'W' : 'L');
                if(m.h.includes("Kolkata") || m.a.includes("Kolkata")) kkrH.push(res.includes("Kolkata") ? 'W' : 'L');
            }
        });

        document.getElementById('p1-display').innerText = data.p1Score || 0;
        document.getElementById('p2-display').innerText = data.p2Score || 0;

        const sorted = Object.keys(table).sort((a,b) => (table[b].pts - table[a].pts) || (parseFloat(nrrData[b]||0) - parseFloat(nrrData[a]||0)));

        document.getElementById('points-body').innerHTML = sorted.map(t => {
            const winPct = table[t].p > 0 ? ((table[t].w / table[t].p) * 100).toFixed(1) : "0.0";
            return `
                <tr>
                    <td>${t.split(' ').pop()} <button class="nrr-btn" onclick="updateNRR('${t}')">✎</button></td>
                    <td>${table[t].p}</td><td>${table[t].w}</td><td>${table[t].l}</td>
                    <td style="color:var(--gold); font-weight:bold;">${table[t].pts}</td>
                    <td>${winPct}%</td>
                    <td style="color:var(--p1-color); font-size:0.6rem;">${nrrData[t] || '0.000'}</td>
                </tr>
            `}).join('');

        const histUI = (id, list) => {
            const last5 = list.slice(-5);
            // Pad with empty circles if fewer than 5 matches played
            while(last5.length < 5) last5.unshift('Pending');
            document.getElementById(id).innerHTML = last5.map(r => `<div class="form-circle form-${r}">${r[0]}</div>`).join('');
        };
        histUI('srh-history', srhH); histUI('kkr-history', kkrH);

        const grid = document.getElementById('grid');
        grid.innerHTML = matches.map(m => {
            const pick = picks[m.id] || {};
            const win = results[m.id];
            return `
                <div class="match-card ${win ? 'finished' : ''}" style="border-left: 6px solid ${teamColors[m.h]}">
                    <div class="date">M${m.id} • ${m.date}</div>
                    <div class="vs-container">
                        <button class="team-btn ${pick.p1===m.h?'p1-picked':''} ${pick.p2===m.h?'p2-picked':''}" onclick="makePick(${m.id},'${m.h}','${m.a}')">${m.h}</button>
                        <span style="font-weight:bold; color:#4b5563; font-size:0.6rem;">VS</span>
                        <button class="team-btn ${pick.p1===m.a?'p1-picked':''} ${pick.p2===m.a?'p2-picked':''}" onclick="makePick(${m.id},'${m.a}','${m.h}')">${m.a}</button>
                    </div>
                    <button class="result-btn" ${win ? 'disabled' : ''} onclick="resolveMatch(${m.id}, '${m.h}', '${m.a}')">
                        ${win ? `WINNER: ${win}` : 'DECLARE WINNER'}
                    </button>
                </div>
            `;
        }).join('');
    }

    function updateNRR(teamName) {
        const val = prompt(`Enter NRR for ${teamName}:`, "0.000");
        if (val === null) return;
        db.ref('ipl_battle_2026/nrr').update({ [teamName]: parseFloat(val).toFixed(3) });
    }

    function makePick(id, sel, oth) {
        const up = {}; up[`picks/${id}/${myId}`] = sel; up[`picks/${id}/${otherId}`] = oth;
        db.ref('ipl_battle_2026').update(up);
    }

    function resolveMatch(id, tA, tB) {
        const res = prompt(`Winner of Match ${id}:\nType "${tA}", "${tB}", or "RAIN"`);
        if (!res) return;
        const norm = res.trim();
        db.ref('ipl_battle_2026').once('value', snap => {
            const d = snap.val() || {};
            const p = d.picks ? d.picks[id] : null;
            const up = {}; 
            up[`results/${id}`] = norm;
            if (norm !== "RAIN" && p) {
                if (p.p1 === norm) up[`p1Score`] = (d.p1Score || 0) + 1;
                if (p.p2 === norm) up[`p2Score`] = (d.p2Score || 0) + 1;
            }
            db.ref('ipl_battle_2026').update(up);
        });
    }

    function resetData() {
        if(confirm("Wipe everything and start over?")) {
            db.ref('ipl_battle_2026').set({ p1Score: 0, p2Score: 0, results: {}, nrr: {} });
        }
    }
</script>
